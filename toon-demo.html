<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>어휴게소 — 무채색 공감툰 시안</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap" />
<link rel="stylesheet" crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />
<style>
  :root{
    --ink:#1d1b18; --paper:#f6f5f1; --g1:#efeee9; --g2:#cfcdc6; --g3:#8d8a83;
    --pen:"Nanum Pen Script", cursive;
    --hand:"Gaegu", cursive;
    --title:"Black Han Sans", sans-serif;
    --body:"Pretendard Variable", Pretendard, system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--body);
    /* 아주 옅은 하프톤 점 — 무채색 종이 질감 */
    background-image:radial-gradient(rgba(0,0,0,.05) 1px, transparent 1.4px);
    background-size:14px 14px;
    display:flex; justify-content:center; padding:26px 16px 60px;
  }
  .strip{ width:min(440px,100%); display:flex; flex-direction:column; gap:22px }

  .tab{ font-family:var(--pen); font-size:20px; color:var(--g3); text-align:center; letter-spacing:.02em }

  /* 공감툰 '칸' — 먹선 + 단단한 그림자(스티커 느낌) */
  .panel{
    background:#fff; border:2.5px solid var(--ink); border-radius:20px;
    box-shadow:6px 6px 0 var(--ink); padding:26px 22px; position:relative;
  }
  .panel.tilt{ transform:rotate(-1deg) }

  .doodle{ width:170px; height:170px; display:block; margin:2px auto 6px }
  .doodle .fill{ fill:var(--g1) } .doodle .ln{ fill:none; stroke:var(--ink); stroke-width:4; stroke-linecap:round; stroke-linejoin:round }
  .doodle .thin{ stroke-width:3 } .doodle .gray{ stroke:var(--g3) }

  .title{ font-family:var(--title); font-size:54px; text-align:center; line-height:1; letter-spacing:.01em }
  .hanja{ font-family:var(--pen); font-size:22px; color:var(--g3); text-align:center; margin-top:4px }

  /* 말풍선 */
  .bubble{
    position:relative; margin:20px auto 0; max-width:300px;
    background:#fff; border:2.5px solid var(--ink); border-radius:18px;
    padding:14px 18px; font-family:var(--hand); font-weight:700; font-size:21px;
    line-height:1.45; text-align:center;
  }
  .bubble::after{ content:""; position:absolute; left:46px; bottom:-13px;
    width:18px; height:18px; background:#fff; border-right:2.5px solid var(--ink);
    border-bottom:2.5px solid var(--ink); transform:rotate(45deg); }

  /* 만화 버튼 */
  .cbtn{ display:block; width:fit-content; margin:24px auto 2px;
    font-family:var(--hand); font-weight:700; font-size:20px; color:#fff;
    background:var(--ink); border:2.5px solid var(--ink); border-radius:14px;
    padding:11px 24px; box-shadow:4px 4px 0 var(--g2); cursor:pointer; }

  /* 의성어 스티커 */
  .sfx{ position:absolute; font-family:var(--pen); color:var(--g3);
    pointer-events:none; line-height:.9 }
  .sfx.s1{ top:-14px; right:8px; font-size:40px; transform:rotate(8deg); color:var(--ink) }
  .sfx.s2{ bottom:10px; left:-6px; font-size:26px; transform:rotate(-10deg) }

  /* 메뉴 미니 칸 */
  .menu{ display:flex; align-items:center; gap:16px }
  .menu .cup{ width:74px; height:74px; flex:0 0 auto }
  .menu h3{ font-family:var(--hand); font-weight:700; font-size:22px }
  .menu .meta{ font-family:var(--pen); font-size:19px; color:var(--g3); margin-top:2px }
  .dash{ border:0; border-top:2.5px dashed var(--g2); margin:16px 0 }
  .price{ font-family:var(--pen); font-size:20px; display:flex; justify-content:space-between; color:var(--ink) }

  .foot{ font-family:var(--pen); font-size:21px; text-align:center; color:var(--g3); margin-top:6px }
  .tag-note{ text-align:center; font-family:var(--pen); color:var(--g2); font-size:16px; letter-spacing:.1em }
</style>
</head>
<body>
  <div class="strip">

    <p class="tab">전국퇴사자연합 직영 ✎</p>

    <!-- 히어로 칸 -->
    <section class="panel tilt">
      <span class="sfx s1">어휴…</span>
      <span class="sfx s2">쓰읍—</span>

      <!-- 직접 그린 동글이: 지쳐서 커피 든 직장인 -->
      <svg class="doodle" viewBox="0 0 200 200" aria-hidden="true">
        <!-- 몸통 -->
        <path class="fill ln" d="M58 196 q-2 -52 42 -52 q44 0 42 52 Z"/>
        <!-- 머리 -->
        <circle class="fill ln" cx="100" cy="66" r="42"/>
        <!-- 앞머리 삐침 -->
        <path class="ln thin" d="M84 30 q6 -10 14 -3 M104 28 q8 -7 13 2"/>
        <!-- 졸린 눈(반쯤 감김) -->
        <path class="ln thin" d="M78 66 q8 7 16 0 M106 66 q8 7 16 0"/>
        <!-- 입(작은 한숨) -->
        <path class="ln thin" d="M92 88 q8 5 16 0"/>
        <!-- 땀 한 방울 -->
        <path class="ln thin gray" d="M142 52 q-7 9 0 14 q7 -5 0 -14 Z"/>
        <!-- 커피컵 + 김 -->
        <rect class="fill ln thin" x="120" y="132" width="30" height="24" rx="4"/>
        <path class="ln thin gray" d="M128 124 q5 -7 0 -13 M140 124 q5 -7 0 -13"/>
      </svg>

      <h1 class="title">어휴게소</h1>
      <p class="hanja">御 休 憩 所</p>

      <div class="bubble">버티라고 안 함.<br>어휴, 잠깐 쉬었다 가셈</div>

      <button class="cbtn">잠깐 들렀다 가기 →</button>
    </section>

    <p class="tab" style="font-size:17px">— 오늘의 메뉴 —</p>

    <!-- 메뉴 미니 칸 -->
    <section class="panel">
      <span class="sfx s2" style="bottom:14px; right:14px; left:auto">끄덕끄덕</span>
      <div class="menu">
        <svg class="cup doodle" viewBox="0 0 100 100" aria-hidden="true">
          <path class="ln thin gray" d="M40 22 q6 -9 0 -16 M56 22 q6 -9 0 -16"/>
          <path class="fill ln" d="M28 30 h44 l-5 54 q-1 8 -9 8 h-16 q-8 0 -9 -8 Z"/>
          <path class="ln thin" d="M72 40 q12 2 11 14 q-1 10 -12 10"/>
        </svg>
        <div>
          <h3>갓길 라떼 <span style="font-family:var(--pen);color:var(--g3)">(Hot)</span></h3>
          <p class="meta">졸음 ★★★★★ · 원산지: 국내산 번아웃</p>
        </div>
      </div>
      <hr class="dash">
      <p class="price"><span>가격</span><span>₩0 · 셀프</span></p>
    </section>

    <p class="foot">버티지 말고, 들렀다 가세요.</p>
    <p class="tag-note">무채색 공감툰 시안 · 캐릭터는 SVG로 직접 그림</p>
  </div>
</body>
</html>
